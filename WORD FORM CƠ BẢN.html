<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TỪ LOẠI (WORD FORM) - Scroll Between Pages</title>
    <!-- Google Fonts: Nunito -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- jQuery (required for the scroll code) -->

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        /* Mỗi trang chiếm full viewport */
        .page {
            min-height: 100vh;
            width: 100%;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Nội dung trong mỗi trang */
        .content-container {
            max-width: 1000px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        /* Tiêu đề */
        .page-title {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }

        .section-subtitle {
            font-size: 1.6rem;
            font-weight: 700;
            color: #4a5568;
            margin: 30px 0 20px;
            border-bottom: 3px solid #764ba2;
            padding-bottom: 10px;
        }

        /* Ảnh full width */
        .full-image {
            width: 100%;
            border-radius: 20px;
            border: 3px solid #764ba2;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .full-image:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px rgba(118, 75, 162, 0.3);
        }

        /* Modal phóng to ảnh */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        .image-modal.active {
            display: flex;
        }

        .modal-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
            border: 3px solid #764ba2;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 35px;
            color: #f1f1f1;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .modal-close:hover {
            color: #764ba2;
        }

        /* Bài tập Word Form */
        .exercise-list {
            list-style: none;
            margin-bottom: 40px;
        }

        .exercise-item {
            background: #f7fafc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #764ba2;
        }

        .exercise-number {
            font-size: 1.2rem;
            font-weight: 800;
            color: #764ba2;
            margin-bottom: 10px;
        }

        .word-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }

        .word-label {
            min-width: 120px;
            font-weight: 600;
            color: #4a5568;
        }

        .word-input {
            flex: 1;
            min-width: 150px;
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Nunito', sans-serif;
            font-size: 1rem;
        }

        .word-input:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.2);
        }

        .word-input.correct {
            background-color: #c6f6d5;
            border-color: #48bb78;
        }

        .word-input.wrong {
            background-color: #fed7d7;
            border-color: #f56565;
        }

        .feedback-badge {
            font-size: 0.9rem;
            font-weight: 600;
            min-width: 200px;
            color: #4a5568;
        }

        /* Bài tập trắc nghiệm */
        .quiz-list {
            margin: 20px 0;
        }

        .quiz-item {
            background: #f7fafc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            border-left: 5px solid #667eea;
        }

        .quiz-question {
            font-size: 1.1rem;
            font-weight: 600;
            color: #2d3748;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .quiz-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 10px;
        }

        .quiz-option {
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .quiz-option:hover {
            background: #edf2f7;
            border-color: #764ba2;
        }

        .quiz-option.correct-option {
            background: #48bb78;
            color: white;
            border-color: #38a169;
        }

        .quiz-option.wrong-option {
            background: #f56565;
            color: white;
            border-color: #e53e3e;
        }

        .quiz-feedback {
            margin-top: 10px;
            font-size: 0.95rem;
            padding: 10px;
            border-radius: 8px;
            background: #f0f4fa;
            display: none;
        }

        .quiz-feedback.show {
            display: block;
        }

        .quiz-feedback.correct-feedback {
            background: #c6f6d5;
            color: #276749;
        }

        .quiz-feedback.wrong-feedback {
            background: #fed7d7;
            color: #9b2c2c;
        }

        .check-btn, .check-quiz-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px 10px;
            box-shadow: 0 8px 0 #4c51bf;
            transition: all 0.1s;
        }
        .check-btn:active, .check-quiz-btn:active {
            transform: translateY(8px);
            box-shadow: none;
        }

        .result-box {
            background: #c6f6d5;
            border-left: 5px solid #48bb78;
            padding: 15px;
            border-radius: 10px;
            font-weight: 700;
            margin: 20px 0;
            display: none;
        }

        /* Navigation dots */
        .nav-dots {
            position: fixed;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        .nav-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-dot.active {
            background: white;
            transform: scale(1.3);
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        .nav-dot:hover {
            background: white;
        }
    </style>
</head>

        // ---------- DỮ LIỆU BÀI TẬP 1 (Xác định dạng từ) ----------

        // ---------- DỮ LIỆU BÀI TẬP 2 (Trắc nghiệm) ----------
        const quizData = [
            {
                question: "Câu 1: Faraday made many ______ in the field of physics and chemistry.",
                options: ["A. discover", "B. discoveries", "C. discovered", "D. discovering"],
                correct: 1,
                explanation: "many + danh từ số nhiều. made (v) + danh từ: thực hiện điều gì → discoveries (n): những khám phá. Dịch: 'Faraday đã thực hiện nhiều khám phá trong lĩnh vực vật lý và hóa học.'"
            },
            {
                question: "Câu 2: Faraday was an ______ in Davy's laboratory.",
                options: ["A. assistance", "B. assist", "C. assistant", "D. assisted"],
                correct: 2,
                explanation: "an + danh từ số ít bắt đầu bằng nguyên âm. Faraday là người → cần danh từ chỉ người → assistant (n): trợ lý. Dịch: 'Faraday là một trợ lý trong phòng thí nghiệm của Davy.'"
            },
            {
                question: "Câu 3: The generator is one of Faraday's most important ______.",
                options: ["A. achievements", "B. achievement", "C. achieve", "D. achieving"],
                correct: 0,
                explanation: "one of + danh từ số nhiều. important (adj) + danh từ → achievements (n): những thành tựu. Dịch: 'Máy phát điện là một trong những thành tựu quan trọng nhất của Faraday.'"
            },
            {
                question: "Câu 4: We will ______ our English vocabulary if we read English books every day.",
                options: ["A. rich", "B. richness", "C. enrich", "D. richly"],
                correct: 2,
                explanation: "will + động từ nguyên mẫu. our English vocabulary (tân ngữ) → cần ngoại động từ → enrich (v): làm phong phú. Dịch: 'Chúng ta sẽ làm phong phú vốn từ vựng tiếng Anh nếu đọc sách tiếng Anh mỗi ngày.'"
            },
            {
                question: "Câu 5: You study very well. It's ______ that you will fail the exam.",
                options: ["A. possible", "B. impossible", "C. possibility", "D. impossibility"],
                correct: 1,
                explanation: "It's + tính từ. Dựa vào nghĩa 'bạn học rất tốt' → việc trượt là không thể → impossible (adj): không thể. Dịch: 'Bạn học rất tốt. Thật không thể rằng bạn sẽ trượt kỳ thi.'"
            },
            {
                question: "Câu 6: Lan always shares her ______ with me.",
                options: ["A. sadness", "B. sad", "C. sadly", "D. unsad"],
                correct: 0,
                explanation: "her + danh từ. shares (v) + danh từ: chia sẻ điều gì → sadness (n): nỗi buồn. Dịch: 'Lan luôn chia sẻ nỗi buồn của cô ấy với tôi.'"
            },
            {
                question: "Câu 7: These children have the ______ to imitate animals' voice.",
                options: ["A. able", "B. ability", "C. disable", "D. disability"],
                correct: 1,
                explanation: "the + danh từ. have (v) + danh từ: có cái gì → ability (n): khả năng. Dịch: 'Những đứa trẻ này có khả năng bắt chước tiếng động vật.'"
            },
            {
                question: "Câu 8: Money doesn't bring ______ to man.",
                options: ["A. happy", "B. happiness", "C. happily", "D. unhappy"],
                correct: 1,
                explanation: "bring (v) + danh từ: mang lại cái gì. doesn't + động từ → cần danh từ làm tân ngữ → happiness (n): hạnh phúc. Dịch: 'Tiền không mang lại hạnh phúc cho con người.'"
            },
            {
                question: "Câu 9: Good students aren't ______ intelligent students.",
                options: ["A. necessary", "B. necessity", "C. necessarily", "D. unnecessary"],
                correct: 2,
                explanation: "aren't + trạng từ. Trạng từ bổ nghĩa cho cả câu → necessarily (adv): nhất thiết. Dịch: 'Học sinh giỏi không nhất thiết là học sinh thông minh.'"
            },
            {
                question: "Câu 10: I don't believe what he has just said. It is ______.",
                options: ["A. reason", "B. unreasonable", "C. reasonably", "D. reasoning"],
                correct: 1,
                explanation: "It is + tính từ. Dựa vào nghĩa 'tôi không tin' → điều anh ta nói là vô lý → unreasonable (adj): vô lý. Dịch: 'Tôi không tin những gì anh ta vừa nói. Nó thật vô lý.'"
            },
            {
                question: "Câu 11: The teacher does everything in order to ______ her students.",
                options: ["A. courage", "B. encourage", "C. encouragement", "D. encouraged"],
                correct: 1,
                explanation: "in order to + động từ nguyên mẫu. her students (tân ngữ) → cần ngoại động từ → encourage (v): động viên. Dịch: 'Giáo viên làm mọi thứ để động viên học sinh của mình.'"
            },
            {
                question: "Câu 12: Please decide what you want to do. You must make a ______.",
                options: ["A. decide", "B. decision", "C. decisive", "D. decisively"],
                correct: 1,
                explanation: "make a + danh từ. must + động từ → cần danh từ làm tân ngữ → decision (n): quyết định. Dịch: 'Hãy quyết định những gì bạn muốn làm. Bạn phải đưa ra một quyết định.'"
            },
            {
                question: "Câu 13: As an ______, Mr. Pike is very worried about the increasing of juvenile delinquency.",
                options: ["A. educate", "B. education", "C. educator", "D. educative"],
                correct: 2,
                explanation: "an + danh từ số ít bắt đầu bằng nguyên âm. Mr. Pike là người → cần danh từ chỉ người → educator (n): nhà giáo dục. Dịch: 'Là một nhà giáo dục, ông Pike rất lo lắng về sự gia tăng của tội phạm vị thành niên.'"
            },
            {
                question: "Câu 14: The Minister of the Education and Training Department appeared on TV last night to ______ his new policy.",
                options: ["A. public", "B. publicly", "C. publicize", "D. publicizing"],
                correct: 2,
                explanation: "to + động từ nguyên mẫu. his new policy (tân ngữ) → cần ngoại động từ → publicize (v): công bố. Dịch: 'Bộ trưởng Bộ Giáo dục và Đào tạo đã xuất hiện trên TV tối qua để công bố chính sách mới của ông ấy.'"
            },
            {
                question: "Câu 16: He has very high ______ of his only son.",

                correct: 1,
                explanation: "high (adj) + danh từ. has (v) + danh từ: có cái gì → expectation (n): sự kỳ vọng. Dịch: 'Ông ấy có sự kỳ vọng rất cao vào đứa con trai duy nhất của mình.'"
            },
            {
                question: "Câu 17: Farmers need to ______ crops.",
                options: ["A. rotation", "B. rotate", "C. rotational", "D. rotationally"],
                correct: 1,
                explanation: "need to + động từ nguyên mẫu. crops (tân ngữ) → cần ngoại động từ → rotate (v): luân canh. Dịch: 'Nông dân cần luân canh mùa màng.'"
            },
            {
                question: "Câu 18: He doesn't have a job. He is ______.",
                options: ["A. employed", "B. unemployed", "C. employer", "D. employee"],
                correct: 1,
                explanation: "He is + tính từ. Dựa vào nghĩa 'không có việc' → thất nghiệp → unemployed (adj): thất nghiệp. Dịch: 'Anh ấy không có việc. Anh ấy thất nghiệp.'"
            },
            {
                question: "Câu 19: We have to ______ the natural resources of our country.",
                options: ["A. conservational", "B. conserve", "C. conserved", "D. conservation"],
                correct: 1,
                explanation: "have to + động từ nguyên mẫu. the natural resources (tân ngữ) → cần ngoại động từ → conserve (v): bảo tồn. Dịch: 'Chúng ta phải bảo tồn tài nguyên thiên nhiên của đất nước.'"
            },
            {
                question: "Câu 20: The industrial ______ will lead to the country's prosperity.",
                options: ["A. develop", "B. development", "C. developing", "D. developed"],
                correct: 1,
                explanation: "industrial (adj) + danh từ. The + danh từ + will lead → danh từ làm chủ ngữ → development (n): sự phát triển. Dịch: 'Sự phát triển công nghiệp sẽ dẫn đến sự thịnh vượng của đất nước.'"
            },
            {
                question: "Câu 21: Forests must be managed ______.",
                options: ["A. careless", "B. careful", "C. carefully", "D. care"],
                correct: 2,
                explanation: "must be managed (động từ) → cần trạng từ bổ nghĩa. Trạng từ đứng sau động từ → carefully (adv): một cách cẩn thận. Dịch: 'Rừng phải được quản lý một cách cẩn thận.'"
            },
            {
                question: "Câu 22: The little boy felt very ______ because his parents did not let him go with them.",
                options: ["A. disappoint", "B. disappointment", "C. disappointed", "D. disappointing"],
                correct: 2,
                explanation: "felt + tính từ. Little boy là người → tính từ chỉ cảm xúc của người (đuôi -ed) → disappointed (adj): thất vọng. Dịch: 'Cậu bé cảm thấy rất thất vọng vì bố mẹ không cho đi cùng.'"
            },
            {
                question: "Câu 23: Your new dress makes you more ______.",
                options: ["A. beauty", "B. beautiful", "C. beautifully", "D. beautifully (lỗi)"],
                correct: 1,
                explanation: "makes you + tính từ. more + tính từ (so sánh hơn) → beautiful (adj): xinh đẹp. Dịch: 'Chiếc váy mới của bạn khiến bạn xinh đẹp hơn.'"
            },
            {
                question: "Câu 24: There are a lot of ______ differences in England.",
                options: ["A. region", "B. regional", "C. regionally", "D. regions"],
                correct: 1,
                explanation: "differences (n) → cần tính từ bổ nghĩa. a lot of + (adj) + noun → regional (adj): thuộc vùng miền. Dịch: 'Có rất nhiều sự khác biệt vùng miền ở Anh.'"
            },
            {
                question: "Câu 25: The surgeons tried their best to save his life, but unfortunately the operation was ______.",
                options: ["A. success", "B. successful", "C. unsuccessful", "D. successfully"],
                correct: 2,
                explanation: "the operation was + tính từ. but unfortunately → kết quả không thành công → unsuccessful (adj): không thành công. Dịch: 'Các bác sĩ phẫu thuật đã cố gắng hết sức để cứu mạng anh ấy, nhưng thật không may ca phẫu thuật đã không thành công.'"
            },
            {
                question: "Câu 26: ______ waste is one of the causes of air pollution.",
                options: ["A. Industrialization", "B. Industrial", "C. Industry", "D. Industrious"],
                correct: 1,
                explanation: "waste (n) → cần tính từ bổ nghĩa. Tính từ + danh từ → Industrial (adj): thuộc công nghiệp. Dịch: 'Chất thải công nghiệp là một trong những nguyên nhân gây ô nhiễm không khí.'"
            },
            {
                question: "Câu 27: Mount Vesuvious is an ______ volcano.",
                options: ["A. act", "B. active", "C. action", "D. activity"],
                correct: 1,
                explanation: "volcano (n) → cần tính từ bổ nghĩa. an + tính từ bắt đầu bằng nguyên âm → active (adj): đang hoạt động. Dịch: 'Núi Vesuvius là một ngọn núi lửa đang hoạt động.'"
            },
            {
                question: "Câu 28: He has been very interested in doing research on ______ since he was at high school.",
                options: ["A. biology", "B. biological", "C. biologist", "D. biologically"],
                correct: 0,
                explanation: "research on + danh từ: nghiên cứu về lĩnh vực gì. on (giới từ) + danh từ → biology (n): sinh học. Dịch: 'Anh ấy đã rất quan tâm đến việc nghiên cứu sinh học từ khi còn học trung học.'"
            },
            {
                question: "Câu 29: You are old enough to take ______ for what you have done.",
                options: ["A. responsible", "B. responsibility", "C. responsibly", "D. irresponsible"],
                correct: 1,
                explanation: "take + danh từ. take responsibility for: chịu trách nhiệm về → responsibility (n): trách nhiệm. Dịch: 'Bạn đủ lớn để chịu trách nhiệm về những gì mình đã làm.'"
            },
            {
                question: "Câu 30: The interviews with parents showed that the vast majority were ______ of teachers.",
                options: ["A. support", "B. supportive", "C. supporter", "D. supporting"],
                correct: 1,
                explanation: "were + tính từ. be supportive of: ủng hộ ai/cái gì → supportive (adj): ủng hộ. Dịch: 'Các cuộc phỏng vấn với phụ huynh cho thấy đại đa số đều ủng hộ giáo viên.'"
            },
            {
                question: "Câu 31: For ______ reasons, passengers are requested not to leave any luggage unattended.",
                options: ["A. secure", "B. securely", "C. security", "D. securing"],
                correct: 2,
                explanation: "reasons (n) → cần danh từ hoặc tính từ bổ nghĩa. security reasons: lý do an ninh → security (n): an ninh. Dịch: 'Vì lý do an ninh, hành khách được yêu cầu không để hành lý không có người trông coi.'"
            },
            {
                question: "Câu 32: We are impressed by his ______ to help us with the hard mission.",
                options: ["A. will", "B. willing", "C. willingness", "D. willingly"],
                correct: 2,
                explanation: "his + danh từ. by his + danh từ: bởi sự... của anh ấy → willingness (n): sự sẵn lòng. Dịch: 'Chúng tôi ấn tượng bởi sự sẵn lòng giúp đỡ chúng tôi với nhiệm vụ khó khăn của anh ấy.'"
            },
            {
                question: "Câu 33: The more ______ and positive you look, the better you will feel.",
                options: ["A. confident", "B. confident (lỗi)", "C. confidently", "D. confidence"],
                correct: 0,
                explanation: "The more + tính từ + you look (cấu trúc so sánh kép). and nối hai tính từ 'confident' và 'positive' → confident (adj): tự tin. Dịch: 'Bạn càng trông tự tin và tích cực bao nhiêu, bạn sẽ càng cảm thấy tốt hơn bấy nhiêu.'"
            },
            {
                question: "Câu 34: Many Vietnamese people ______ their lives for the revolutionary cause of the nation.",
                options: ["A. sacrifice", "B. sacrificed", "C. sacrificial", "D. sacrificially"],
                correct: 1,
                explanation: "Many Vietnamese people (chủ ngữ) + động từ. Câu diễn tả sự việc đã xảy ra → động từ chia thì quá khứ → sacrificed (v): đã hy sinh. Dịch: 'Nhiều người Việt Nam đã hy sinh cuộc đời của họ cho sự nghiệp cách mạng của dân tộc.'"
            },
            {
                question: "Câu 35: What could be more ______ than a wedding on a tropical island?",
                options: ["A. romance", "B. romantic", "C. romanticize", "D. romanticism"],
                correct: 1,
                explanation: "more + tính từ + than (so sánh hơn). be + tính từ → romantic (adj): lãng mạn. Dịch: 'Điều gì có thể lãng mạn hơn một đám cưới trên đảo nhiệt đới?'"
            },
            {
                question: "Câu 36: Though their performance was not perfect yet, the students held the audience's ______ until the end.",
                options: ["A. attentive", "B. attention", "C. attentively", "D. attentional"],
                correct: 1,
                explanation: "the audience's + danh từ. held (v) + danh từ: giữ điều gì → attention (n): sự chú ý. Dịch: 'Mặc dù màn trình diễn của họ chưa hoàn hảo, nhưng các học sinh vẫn giữ được sự chú ý của khán giả cho đến cuối.'"
            },
            {
                question: "Câu 37: Both Asian and Western students seem ______ about how to answer the questionnaire of the survey.",
                options: ["A. confusedly", "B. confused", "C. confusing", "D. confusion"],
                correct: 1,
                explanation: "seem + tính từ. Students là người → tính từ chỉ cảm xúc của người (đuôi -ed) → confused (adj): bối rối. Dịch: 'Cả sinh viên châu Á và phương Tây dường như bối rối về cách trả lời bảng câu hỏi khảo sát.'"
            },
            {
                question: "Câu 38: She was ______ unaware of the embarrassing situation due to her different cultural background.",
                options: ["A. complete", "B. completed", "C. completing", "D. completely"],
                correct: 3,
                explanation: "unaware (adj) → cần trạng từ bổ nghĩa cho tính từ. was + trạng từ + tính từ → completely (adv): hoàn toàn. Dịch: 'Cô ấy hoàn toàn không nhận thức được tình huống khó xử do nền tảng văn hóa khác biệt của mình.'"
            },
            {
                question: "Câu 39: What is more important to you, intelligence or ______?",
                options: ["A. attraction", "B. attractiveness", "C. attractive", "D. attract"],
                correct: 1,
                explanation: "intelligence (n) + or + danh từ. or nối hai danh từ cùng loại → attractiveness (n): sự hấp dẫn. Dịch: 'Điều gì quan trọng hơn với bạn, trí thông minh hay sự hấp dẫn?'"
            },
            {
                question: "Câu 40: Children who are isolated and lonely seem to have poor language and ______.",
                options: ["A. communicator", "B. communication", "C. communicative", "D. communicate"],
                correct: 1,
                explanation: "language (n) + and + danh từ. have (v) + danh từ → communication (n): giao tiếp. Dịch: 'Trẻ em bị cô lập và cô đơn dường như có ngôn ngữ và giao tiếp kém.'"
            }
        ];

        // ---------- RENDER BÀI TẬP 1 ----------
        function renderExercises() {
            const list = document.getElementById('exercise-list');
            let html = '';

            wordData.forEach(item => {
                html += `<li class="exercise-item">`;
                html += `<div class="exercise-number">${item.base}</div>`;

                item.parts.forEach((part, index) => {
                    const inputId = `input-${item.base}-${index}`;
                    const feedbackId = `fb-${item.base}-${index}`;
                    html += `
                        <div class="word-row">
                            <span class="word-label">${part}:</span>
                            <input type="text" class="word-input" id="${inputId}" placeholder="vd: n, adj, v..." 
                                   onkeypress="handleEnter(event, '${item.base}', ${index})"
                                   onblur="checkSingleAnswer('${item.base}', ${index})">
                            <span class="feedback-badge" id="${feedbackId}"></span>
                        </div>
                    `;
                });

                html += `</li>`;
            });

            list.innerHTML = html;
        }

        // Xử lý phím Enter
        window.handleEnter = function(event, base, index) {
            if (event.key === 'Enter') {
                event.preventDefault();
                checkSingleAnswer(base, index);
            }
        };

        // Kiểm tra một ô đơn lẻ
        window.checkSingleAnswer = function(base, index) {
            const part = wordData.find(item => item.base.includes(base.split(' ')[0]))?.parts[index];
            if (!part) return;
            
            const input = document.getElementById(`input-${base}-${index}`);
            const fb = document.getElementById(`fb-${base}-${index}`);
            if (!input || !fb) return;

            const userAnswer = input.value.trim().toLowerCase();
            const correctAnswer = correctAnswers[part] || "";

            if (userAnswer === correctAnswer) {
                input.classList.add('correct');
                input.classList.remove('wrong');
                fb.innerHTML = '✅ Đúng';
                fb.style.color = '#48bb78';
            } else {
                input.classList.add('wrong');
                input.classList.remove('correct');
                fb.innerHTML = `❌ Sai (đáp án: ${correctAnswer})`;
                fb.style.color = '#f56565';
            }
        };

        // Kiểm tra tất cả bài 1
        window.checkAllAnswers = function() {
            let correctCount = 0;
            let totalInputs = 0;

            wordData.forEach(item => {
                item.parts.forEach((part, index) => {
                    const base = item.base.split(' ')[0];
                    const input = document.getElementById(`input-${item.base}-${index}`);
                    const fb = document.getElementById(`fb-${item.base}-${index}`);
                    if (!input || !fb) return;

                    totalInputs++;
                    const userAnswer = input.value.trim().toLowerCase();
                    const correctAnswer = correctAnswers[part] || "";

                    if (userAnswer === correctAnswer) {
                        input.classList.add('correct');
                        input.classList.remove('wrong');
                        fb.innerHTML = '✅ Đúng';
                        fb.style.color = '#48bb78';
                        correctCount++;
                    } else {
                        input.classList.add('wrong');
                        input.classList.remove('correct');
                        fb.innerHTML = `❌ Sai (đáp án: ${correctAnswer})`;
                        fb.style.color = '#f56565';
                    }
                });
            });

            const resultBox = document.getElementById('result-box');
            resultBox.style.display = 'block';
            resultBox.innerHTML = `✅ Bạn đã làm đúng <strong>${correctCount}/${totalInputs}</strong> ô.`;
        };

        // ---------- RENDER BÀI TẬP 2 ----------
        function renderQuiz() {
            const list = document.getElementById('quiz-list');
            let html = '';

            quizData.forEach((item, qIndex) => {
                html += `<div class="quiz-item" data-qindex="${qIndex}">`;
                html += `<div class="quiz-question">${item.question}</div>`;
                html += `<div class="quiz-options">`;

                item.options.forEach((opt, optIndex) => {
                    html += `<div class="quiz-option" onclick="checkQuizAnswerImmediately(${qIndex}, ${optIndex})">${opt}</div>`;
                });

                html += `</div>`;
                html += `<div class="quiz-feedback" id="quiz-feedback-${qIndex}"></div>`;
                html += `</div>`;
            });

            list.innerHTML = html;
        }

        // Kiểm tra đáp án ngay khi chọn
        window.checkQuizAnswerImmediately = function(qIndex, optIndex) {
            const item = quizData[qIndex];
            const options = document.querySelectorAll(`.quiz-item[data-qindex="${qIndex}"] .quiz-option`);
            const feedbackDiv = document.getElementById(`quiz-feedback-${qIndex}`);
            
            // Xóa highlight cũ
            options.forEach(opt => {
                opt.classList.remove('correct-option', 'wrong-option');
            });

            if (optIndex === item.correct) {
                // Đúng
                options[optIndex].classList.add('correct-option');
                feedbackDiv.innerHTML = `✅ Đúng! ${item.explanation}`;
                feedbackDiv.className = 'quiz-feedback show correct-feedback';
            } else {
                // Sai
                options[optIndex].classList.add('wrong-option');
                options[item.correct].classList.add('correct-option');
                feedbackDiv.innerHTML = `❌ Sai. Đáp án đúng: ${item.options[item.correct]}. ${item.explanation}`;
                feedbackDiv.className = 'quiz-feedback show wrong-feedback';
            }
        };

        // ---------- MODAL FUNCTIONS ----------
        window.openModal = function(src) {
            document.getElementById('imageModal').classList.add('active');
            document.getElementById('modalImage').src = src;
        };

        window.closeModal = function() {
            document.getElementById('imageModal').classList.remove('active');
        };

        // ---------- SCROLL FUNCTIONS ----------
        window.scrollToPage = function(target) {
            $('html, body').animate({
                scrollTop: $(target).offset().top
            }, 1000, function() {
                window.location.hash = target;
            });
        };

        function updateActiveDot() {
            const scrollPos = $(window).scrollTop();
            const pages = ['#page1', '#page2', '#page3'];
            
            pages.forEach((page, index) => {
                const offset = $(page).offset().top;
                const height = $(page).outerHeight();
                
                if (scrollPos >= offset - 100 && scrollPos < offset + height - 100) {
                    $('.nav-dot').eq(index).addClass('active').siblings().removeClass('active');
                }
            });
        }

        // ---------- KHỞI TẠO ----------
        $(document).ready(function() {
            renderExercises();
            renderQuiz();
            
            $('.nav-dot').click(function() {
                const index = $(this).index();
                const targets = ['#page1', '#page2', '#page3'];
                scrollToPage(targets[index]);
            });

            $(window).on('scroll', updateActiveDot);
            
            if (window.location.hash) {
                setTimeout(function() {
                    $('html, body').scrollTop(0).show();
                    scrollToPage(window.location.hash);
                }, 0);
            } else {
                $('html, body').show();
            }
        });
    </script>
</body>
</html>
