    const canvas = document.getElementById('confetti-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    let particles = [];
    function createConfetti() {
        for (let i = 0; i < 30; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height - canvas.height,
                w: 8, h: 8,
                color: `hsl(${Math.random() * 360}, 100%, 60%)`,
                vy: Math.random() * 3 + 2,
                vx: Math.random() * 2 - 1,
                rot: Math.random() * 360
            });
        }
    }
    function drawConfetti() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach((p, i) => {
            p.y += p.vy;
            p.x += p.vx;
            ctx.save();
            ctx.translate(p.x, p.y);
            ctx.rotate(p.rot);
            ctx.fillStyle = p.color;
            ctx.fillRect(-4, -4, 8, 8);
            ctx.restore();
            if (p.y > canvas.height) particles.splice(i, 1);
        });
        requestAnimationFrame(drawConfetti);
    }
    drawConfetti();
    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

    function playDing() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sine';
        o.frequency.setValueAtTime(880, audioCtx.currentTime);
        o.frequency.exponentialRampToValueAtTime(1568, audioCtx.currentTime + 0.15);
        g.gain.setValueAtTime(0.4, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + 0.5);
    }
    function playBuzz() {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'sawtooth';
        o.frequency.setValueAtTime(250, audioCtx.currentTime);
        o.frequency.setValueAtTime(200, audioCtx.currentTime + 0.15);
        o.frequency.setValueAtTime(150, audioCtx.currentTime + 0.3);
        g.gain.setValueAtTime(0.4, audioCtx.currentTime);
        g.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
        o.connect(g);
        g.connect(audioCtx.destination);
        o.start();
        o.stop(audioCtx.currentTime + 0.6);
    }

    // render
    const wrapper = document.getElementById('examWrapper');
    function renderAll() {
        let html = '';
        exams.forEach((exam, idxExam) => {
            html += `<div class="exam-card" id="exam${idxExam}" data-exam-index="${idxExam}">`;
            html += `<div class="exam-title">${exam.title}</div>`;

            exam.parts.forEach((part, pIdx) => {
                html += `<div class="part"><h3>${part.partName}</h3>`;
                html += `<div class="audio-block"><span>🎵 Audio:</span><audio controls src="${part.audio}"></audio></div>`;

                part.questions.forEach((q, qIdx) => {
                    html += `<div class="question-item" id="q_${idxExam}_${pIdx}_${qIdx}">`;
                    html += `<div class="q-text">${q.q}</div>`;
                    html += `<div class="options">`;
                    q.opts.forEach((opt, optIdx) => {
                        html += `<button class="opt-btn" data-ex="${idxExam}" data-part="${pIdx}" data-q="${qIdx}" data-opt="${optIdx}">${opt}</button>`;
                    });
                    html += `</div>`;

                    // explanation box
                    html += `<div class="explain-box" id="exp_${idxExam}_${pIdx}_${qIdx}">`;
                    html += `<h4>✅ Đáp án đúng: ${String.fromCharCode(65 + q.correct)} (${q.opts[q.correct]})</h4>`;
                    html += `<h5>📌 Keyword & paraphrase:</h5><table><tr><th>Key question</th><th>Key audio</th></tr>`;
                    if (q.explain.keywords) {
                        q.explain.keywords.forEach(k => html += `<tr><td>${k.q}</td><td>${k.a}</td></tr>`);
                    }
                    html += `</table><h5>📝 Evidence:</h5><p>${q.explain.evidence || ''}</p>`;
                    if (q.explain.distractors && q.explain.distractors.length) {
                        html += `<h5>⚠️ Distractors:</h5><ul class="distractor-list">`;
                        q.explain.distractors.forEach(d => html += `<li>${d}</li>`);
                        html += `</ul>`;
                    }
                    html += `<h5>🌎 Dịch:</h5><p>${q.explain.translation || ''}</p>`;
                    html += `</div></div>`;
                });
                html += `</div>`;
            });

            // transcript
            html += `<div class="transcript-area" id="transWrap_${idxExam}">`;
            html += `<button class="transcript-btn" id="transBtn_${idxExam}" data-ex="${idxExam}">📄 Xem Transcript đề ${idxExam + 1}</button>`;
            html += `<div class="transcript-panel" id="transPanel_${idxExam}">${exam.transcriptFull}</div>`;
            html += `</div>`;

            html += `<button class="submit-exam-btn" data-submit-ex="${idxExam}">📬 Nộp bài đề ${idxExam + 1}</button>`;
            html += `</div>`;
        });
        wrapper.innerHTML = html;

        // attach events
        document.querySelectorAll('.opt-btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                if (this.classList.contains('locked')) return;
                const ex = this.dataset.ex;
                const part = this.dataset.part;
                const qIdx = this.dataset.q;
                const optChosen = parseInt(this.dataset.opt);
                const questionObj = exams[ex].parts[part].questions[qIdx];
                const correctIdx = questionObj.correct;
                const parentDiv = this.closest('.question-item');
                const allOpts = parentDiv.querySelectorAll('.opt-btn');
                allOpts.forEach(b => b.classList.add('locked'));

                if (optChosen === correctIdx) {
                    this.classList.add('correct');
                    playDing();
                    createConfetti();
                } else {
                    this.classList.add('incorrect');
                    playBuzz();
                    allOpts.forEach(b => {
                        if (parseInt(b.dataset.opt) === correctIdx) b.classList.add('correct');
                    });
                }
                const expDiv = parentDiv.querySelector('.explain-box');
                if (expDiv) expDiv.style.display = 'block';

                // check if all answered
                const examDiv = document.getElementById(`exam${ex}`);
                const totalOptBtns = examDiv.querySelectorAll('.opt-btn').length;
                const lockedBtns = examDiv.querySelectorAll('.opt-btn.locked').length;
                if (totalOptBtns === lockedBtns) {
                    const transBtn = document.getElementById(`transBtn_${ex}`);
                    if (transBtn) transBtn.classList.add('enabled');
                }
            });
        });

        // transcript toggle
        exams.forEach((_, idx) => {
            document.getElementById(`transBtn_${idx}`).addEventListener('click', function () {
                const panel = document.getElementById(`transPanel_${idx}`);
                panel.style.display = (panel.style.display === 'block') ? 'none' : 'block';
            });
        });

        // submit exam
        document.querySelectorAll('[data-submit-ex]').forEach(btn => {
            btn.addEventListener('click', function () {
                const exIdx = this.dataset.submitEx;
                const examDiv = document.getElementById(`exam${exIdx}`);
                const totalQs = examDiv.querySelectorAll('.question-item').length;
                const locked = examDiv.querySelectorAll('.opt-btn.locked').length;
                const expected = examDiv.querySelectorAll('.opt-btn').length;
                if (locked < expected) {
                    alert('Bạn chưa trả lời hết câu hỏi!');
                    return;
                }

                let score = 0;
                const qItems = examDiv.querySelectorAll('.question-item');
                qItems.forEach((item, idx) => {
                    const correctAns = exams[exIdx].parts.flatMap(p => p.questions)[idx].correct;
                    const chosen = item.querySelector('.opt-btn.correct:not(.incorrect)');
                    if (chosen && parseInt(chosen.dataset.opt) === correctAns) score++;
                });
                const total = qItems.length;
                const percent = (score / total) * 100;
                let gif, title;
                if (percent === 100) {
                    gif = "https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif";
                    title = "Xuất sắc!";
                } else if (percent >= 60) {
                    gif = "https://media.giphy.com/media/3o7abKhOpu0NwenH3O/giphy.gif";
                    title = "Tốt!";
                } else {
                    gif = "https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif";
                    title = "Cố gắng hơn!";
                }
                document.getElementById('modalTitle').innerText = `Đề ${+exIdx + 1} - ${title}`;
                document.getElementById('modalScore').innerText = `${score}/${total}`;
                document.getElementById('modalGif').src = gif;
                document.getElementById('resultModal').style.display = 'flex';
            });
        });
    }
    function closeModal() {
        document.getElementById('resultModal').style.display = 'none';
    }
    window.onload = renderAll;
</script>
