    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #f0fdfa;
            background-image: radial-gradient(#ccfbf1 2px, transparent 2px);
            background-size: 30px 30px;
        }

        .btn-3d {
            transition: all 0.1s;
            border-bottom-width: 6px;
            position: relative;
            top: 0px;
        }
        
        .btn-3d:active {
            border-bottom-width: 0px;
            top: 6px;
        }

        .btn-default {
            background-color: white;
            color: #4b5563;
            border-color: #e5e7eb;
            border-bottom-color: #d1d5db;
        }
        .btn-default:hover {
            background-color: #f9fafb;
            transform: translateY(-2px);
            border-bottom-width: 8px;
            top: -2px;
        }
        .btn-default:active {
            transform: translateY(4px);
            border-bottom-width: 0px;
            top: 4px;
        }

        .btn-correct {
            background-color: #00D26A !important;
            color: white !important;
            border-color: #00b85c !important;
            border-bottom-color: #008f47 !important;
            pointer-events: none;
        }

        .btn-wrong {
            background-color: #FF4757 !important;
            color: white !important;
            border-color: #ff2e40 !important;
            border-bottom-color: #cc1e2e !important;
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            pointer-events: none;
        }

        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }

        .fade-in-up {
            animation: fadeInUp 0.5s ease-out forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .custom-scrollbar::-webkit-scrollbar {

            top: 0;

        // Image zoom function

            const modal = document.getElementById('imageModal');

            modal.style.display = 'block';

        }

        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        };

        // Audio Context for sound effects
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();

            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);

            if (type === 'correct') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(500, audioCtx.currentTime);
                oscillator.frequency.exponentialRampToValueAtTime(1000, audioCtx.currentTime + 0.1);
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            } else {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
                oscillator.frequency.linearRampToValueAtTime(200, audioCtx.currentTime + 0.15);
                oscillator.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.3);
                
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
                
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.5);
            }
        }

        // Function to shuffle array (Fisher-Yates)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // Function to shuffle options for a question and update correct index
        function shuffleQuestionOptions(question) {
            const correctText = question.answerOptions.find(opt => opt.isCorrect).text;
            const shuffledOptions = shuffleArray([...question.answerOptions]);
            question.answerOptions = shuffledOptions;
            return question;
        }

                        { "text": "C. block", "rationale": "✅ Đáp án đúng: C\n\nGiải thích: 'Block of granite' là cách diễn đạt chính xác để chỉ một khối đá granit.\n\n❌ A. slice: không phù hợp vì 'slice' không liên quan đến đá.\n❌ B. bar: không phù hợp vì 'bar' không liên quan đến đá.\n❌ D. clove: không phù hợp vì 'clove' chỉ nhánh tỏi.\n\nDịch nghĩa: Đài tưởng niệm được xây dựng từ một khối đá granit khổng lồ được vận chuyển từ mỏ đá gần đó.", "isCorrect": true },
                        { "text": "D. clove", "rationale": "❌ Sai. 'clove' chỉ nhánh tỏi.", "isCorrect": false }
                    ],
                    "hint": "Đơn vị của đá là gì?"
                }
            ]
        };

        // Create a deep copy and shuffle options for all questions
        let quizData = JSON.parse(JSON.stringify(originalQuizData));
        quizData.questions = quizData.questions.map(q => shuffleQuestionOptions(q));

        // APP LOGIC
        let currentQuestionIndex = 0;
        let score = 0;
        const totalQuestions = quizData.questions.length;
        let answered = false;

        // Render Question
        function renderQuestion(index) {
            answered = false;
            const q = quizData.questions[index];
            
            // Update Text
            document.getElementById('q-number').textContent = q.questionNumber;
            document.getElementById('question-text').textContent = q.question;
            document.getElementById('hint-text').textContent = q.hint;
            document.getElementById('hint-box').classList.add('hidden');
            
            // Update Progress
            const progress = ((index) / totalQuestions) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            // Reset UI
            document.getElementById('explanation-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('finish-btn').classList.add('hidden');
            
            // Options
            const optionsDiv = document.getElementById('options-grid');
            optionsDiv.innerHTML = '';

            q.answerOptions.forEach((opt, idx) => {
                const btn = document.createElement('button');
                btn.className = `btn-3d btn-default w-full p-4 rounded-xl text-lg font-bold text-gray-700 flex items-center justify-between group`;
                btn.innerHTML = `
                    <div class="flex items-center gap-3">
                        <span class="w-8 h-8 rounded-full bg-indigo-100 text-indigo-600 flex items-center justify-center text-sm border-2 border-indigo-200 group-hover:bg-indigo-200 transition-colors">
                            ${String.fromCharCode(65 + idx)}
                        </span>
                        <span>${opt.text}</span>
                    </div>
                `;
                btn.onclick = () => checkAnswer(btn, opt, q);
                optionsDiv.appendChild(btn);
            });
        }

        // Check Answer
        function checkAnswer(btn, option, questionData) {
            if (answered) return;
            answered = true;

            const allBtns = document.querySelectorAll('#options-grid button');

            if (option.isCorrect) {
                score++;
                document.getElementById('score-display').textContent = `${score}/${totalQuestions}`;
                btn.classList.remove('btn-default');
                btn.classList.add('btn-correct');
                playSound('correct');
                confetti({
                    particleCount: 100,
                    spread: 70,
                    origin: { y: 0.6 }
                });
            } else {
                btn.classList.remove('btn-default');
                btn.classList.add('btn-wrong');
                playSound('wrong');
                
                questionData.answerOptions.forEach((opt, idx) => {
                    if (opt.isCorrect) {
                        allBtns[idx].classList.remove('btn-default');
                        allBtns[idx].classList.add('btn-correct');
                        allBtns[idx].style.opacity = "0.7";
                    }
                });
            }

            allBtns.forEach(b => b.disabled = true);

            showExplanation(questionData.answerOptions.find(o => o.isCorrect).rationale);

            if (currentQuestionIndex < totalQuestions - 1) {
                document.getElementById('next-btn').classList.remove('hidden');
            } else {
                document.getElementById('finish-btn').classList.remove('hidden');
                document.getElementById('progress-bar').style.width = '100%';
            }
        }

        function showExplanation(rationaleText) {
            const expBox = document.getElementById('explanation-box');
            const expContent = document.getElementById('explanation-content');
            
            let formattedText = rationaleText
                .replace(/✅/g, '<span class="text-green-600 font-bold text-lg">✅</span>')
                .replace(/❌/g, '<span class="text-red-500 font-bold">❌</span>')
                .replace(/\n/g, '<br>');
            
            expContent.innerHTML = formattedText;
            expBox.classList.remove('hidden');
        }

        function toggleHint() {
            document.getElementById('hint-box').classList.toggle('hidden');
        }

        function nextQuestion() {
            currentQuestionIndex++;
            renderQuestion(currentQuestionIndex);
        }

        function finishQuiz() {
            const modal = document.getElementById('result-modal');
            const finalScoreEl = document.getElementById('final-score');
            const feedbackEl = document.getElementById('feedback-text');

            finalScoreEl.textContent = `${score}/${totalQuestions}`;
            
            const percentage = (score / totalQuestions) * 100;
            if (percentage === 100) {
                feedbackEl.textContent = "Tuyệt đỉnh! Không sai câu nào! 🌟👽";
                confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
            } else if (percentage >= 80) {
                feedbackEl.textContent = "Làm tốt lắm! Em rất thông minh! 🚀";
            } else if (percentage >= 50) {
                feedbackEl.textContent = "Cố gắng thêm chút nữa nhé! 💪";
            } else {
                feedbackEl.textContent = "Hãy ôn tập lại từ vựng nhé! 📚";
            }

            modal.classList.remove('hidden');
        }

        // Initialize
        renderQuestion(0);
        document.getElementById('score-display').textContent = `0/${totalQuestions}`;

    </script>
</body>
</html>
